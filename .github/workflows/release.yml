name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: 'Mark as prerelease'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install web dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets (Next.js static export)
        run: pnpm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.FIGHTING_CLUB_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::FIGHTING_CLUB_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          echo "Keystore decoded: $(stat -c %s android/app/release.keystore) bytes"

      - name: Sync Capacitor (web → android)
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.FIGHTING_CLUB_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.FIGHTING_CLUB_KEY_PASSWORD }}
          KEY_ALIAS: fighting-club
        run: ./gradlew assembleRelease --no-daemon

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # APK
          cp android/app/build/outputs/apk/release/app-release.apk release-assets/FightingClub-${{ github.ref_name || github.event.inputs.tag }}.apk
          # dist.zip (OTA web bundle)
          (cd dist && zip -r ../release-assets/dist.zip .)
          # version.json (OTA manifest)
          cat > release-assets/version.json <<EOF
          {
            "webVersion": "1.0.0",
            "webDownloadUrl": "https://github.com/Thatht137/ysu-client/releases/latest/download/dist.zip",
            "apkVersionCode": 1000099,
            "apkDownloadUrl": "https://github.com/Thatht137/ysu-client/releases/latest/download/FightingClub-${{ github.ref_name || github.event.inputs.tag }}.apk",
            "body": "Fighting Club 1.0.0",
            "channels": {
              "stable": {
                "webVersion": "1.0.0",
                "webDownloadUrl": "https://github.com/Thatht137/ysu-client/releases/latest/download/dist.zip",
                "apkVersionCode": 1000099,
                "apkDownloadUrl": "https://github.com/Thatht137/ysu-client/releases/latest/download/FightingClub-${{ github.ref_name || github.event.inputs.tag }}.apk",
                "body": "Fighting Club 1.0.0 stable"
              }
            }
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: ${{ github.ref_name || github.event.inputs.tag }}
          prerelease: ${{ github.event.inputs.prerelease == true }}
          body: |
            ## Fighting Club ${{ github.ref_name || github.event.inputs.tag }}

            本 Release 包含三个产物：

            - **FightingClub-*.apk** — Android 安装包，直接装到手机
            - **dist.zip** — OTA 热更新包，App 内检查更新会下载此文件
            - **version.json** — OTA 元数据，App 内检查更新会拉取此文件

            **安装方法**：下载 APK，允许"安装未知来源应用"后点击安装。
            **OTA 升级**：已安装旧版本的用户，在 App 设置里"检查更新"即可收到新版。
          files: |
            release-assets/*.apk
            release-assets/dist.zip
            release-assets/version.json
          fail_on_unmatched_files: true
