name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"
      prerelease:
        description: "Mark as prerelease"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install web dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets
        run: pnpm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.FIGHTING_CLUB_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::FIGHTING_CLUB_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          echo "Keystore decoded: $(stat -c %s android/app/release.keystore) bytes"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.FIGHTING_CLUB_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.FIGHTING_CLUB_KEY_PASSWORD }}
          KEY_ALIAS: fighting-club
        run: ./gradlew assembleRelease --no-daemon

      - name: Compute release metadata
        env:
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: node scripts/release-meta.mjs

      - name: Prepare release assets
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          RELEASE_NAME: ${{ env.RELEASE_NAME }}
          VERSION_CODE: ${{ env.VERSION_CODE }}
          CHANNEL: ${{ env.CHANNEL }}
        run: |
          mkdir -p release-assets
          # Android 安装包
          cp android/app/build/outputs/apk/release/app-release.apk "release-assets/FightingClub-${RELEASE_NAME}.apk"
          # OTA 网页资源
          (cd dist && zip -r ../release-assets/dist.zip .)
          # OTA 元数据和更新公告
          node scripts/gen-version-json.mjs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_NAME }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          body_path: release-assets/release-notes.md
          files: |
            release-assets/*.apk
            release-assets/dist.zip
            release-assets/version.json
          fail_on_unmatched_files: true
